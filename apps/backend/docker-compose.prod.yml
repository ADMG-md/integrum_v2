services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: integrum-backend-prod
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://integrum_service:hardened_password@db:5432/integrum_v2
      - SECRET_KEY=${SECRET_KEY}
      - VAULT_MASTER_KEY=${VAULT_MASTER_KEY}
      - ALLOWED_ORIGINS=https://clinical.integrum.ai
    depends_on:
      db:
        condition: service_healthy
    networks:
      - medical-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: integrum-db-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=integrum_v2
      - POSTGRES_USER=integrum_admin
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d
    networks:
      - medical-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integrum_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  proxy:
    image: caddy:2-alpine
    container_name: integrum-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - medical-network
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  medical-network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
