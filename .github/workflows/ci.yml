name: Integrum V2.5 CI/CD Quality Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: integrum_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-python: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff vulture pytest pytest-cov pytest-asyncio structlog pydantic sqlalchemy asyncpg cryptography python-jose

    - name: Run Ruff Linter (Unused imports/variables check)
      run: |
        # F401: unused imports, F841: unused local variables
        ruff check --select F401,F841 apps/backend/src/

    - name: Run Vulture (Dead Code Analysis)
      run: |
        # Allow exit code 0 even if dead code found (warning mode) or strict enforcement
        vulture apps/backend/src/ --min-confidence 80 --exclude apps/backend/src/engines/specialty/drug_knowledge.py

    - name: Run Verification Unit Tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/integrum_test
      run: |
        export PYTHONPATH=$PYTHONPATH:apps/backend:apps/backend/src
        pytest apps/backend/tests/unit/engines/ --cov=apps/backend/src/engines --cov-fail-under=100
