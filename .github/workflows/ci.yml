name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false  # Skip frontend submodule (separate repo)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -e apps/backend/

      - name: Ruff lint
        run: ruff check apps/backend/src/ --fix --unsafe-fixes || true

      - name: Ruff format check
        run: ruff format --check apps/backend/src/ || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: integrum_user
          POSTGRES_PASSWORD: integrum_password
          POSTGRES_DB: integrum_v2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/backend/[dev]"

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://integrum_user:integrum_password@localhost:5432/integrum_v2_test
          SECRET_KEY: test-secret-key-for-ci-only-not-for-production
          VAULT_MASTER_KEY: zxpoq0-wbIhmTmIr2MpqegqCn7WZabG5v_woxOyzPYg=
          ALLOWED_ORIGINS: http://localhost:3000
          ALLOW_DEV_VAULT_KEY: true
        run: |
          cd apps/backend
          python -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/backend/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build Docker image
        run: |
          docker build \
            --build-arg SECRET_KEY=ci-build-key \
            --build-arg VAULT_MASTER_KEY=zxpoq0-wbIhmTmIr2MpqegqCn7WZabG5v_woxOyzPYg= \
            -t integrum-backend:${{ github.sha }} \
            apps/backend/

      - name: Smoke test container
        run: |
          docker run --rm integrum-backend:${{ github.sha }} python -c "from src.engines.domain import Encounter; print('Import OK')"
